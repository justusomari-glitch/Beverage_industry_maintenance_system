name: Maintenance
on:
    push:
        branches: [main]
    pull_request: 
        branches: [main]
jobs :
    build :
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
              with:
                lfs: True
            - name: Set-up python 3.12
              uses: actions/setup-python@v5
              with:
                python-version: 3.12
            - name: Install Dependancies
              env:
                DAGSHUB_TOKEN: ${{secrets.DAGSHUB_TOKEN}}
              run: |
                python -m pip install --upgrade pip
                pip install -r requirements.txt
                python -m pip install pytest
            - name: Run Tests
              env:
                DAGSHUB_TOKEN: ${{secrets.DAGSHUB_TOKEN}}
                GROQ_API_KEY: ${{secrets.GROQ_API_KEY}}
              run: |
                python -m pytest tests/ -v
            - name: Build Docker image
              env:
                DAGSHUB_TOKEN: ${{secrets.DAGSHUB_TOKEN}}
                GROQ_API_KEY: ${{secrets.GROQ_API_KEY}}
              run: |
                docker build -t product-api .
            - name: Test app import 
              env:
                DAGSHUB_TOKEN: ${{secrets.DAGSHUB_TOKEN}}
                GROQ_API_KEY: ${{secrets.GROQ_API_KEY}}
              run: python -c "from src.predict import app;print('succesfull')"
            - name: Deploy To EC2
              env: 
                EC2_HOST: ${{secrets.EC2_HOST}}
                EC2_USER: ${{secrets.EC2_USER}}
                EC2_KEY: ${{secrets.EC2_KEY}}
              run: |
                echo "$EC2_KEY"> key.pem
                chmod 600 key.pem
                ssh -o StrictHostKeyChecking=no -i key.pem $EC2_USER@$EC2_HOST "
                cd Beverage_industry_maintenance_system &&
                git pull &&
                sudo docker build -t product-api . &&
                sudo docker kill product-api || true &&
                sudo docker stop product-api || true &&
                sudo docker rm product-api || true &&
                sudo docker rm  -f $(sudo docker ps -aq) || true &&
                sudo fuser -k 8000/tcp || true &&
                sudo docker ps -a
                sleep 3 &&
                sudo docker run -d --restart always --name product-api -p 8000:8000 \
                 -e GROQ_API_KEY=${{secrets.GROQ_API_KEY}} \
                 -e DAGSHUB_TOKEN=${{secrets.DAGSHUB_TOKEN}} \
                 product-api
                "




            
